<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card__header">
                <a href="index.html" class="logo-link">                    <span class="logo-text">Корочки<span class="logo-accent">.есть</span></span>
                </a>
                <h1 class="auth-card__title">Создать аккаунт</h1>
            </div>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="login">Логин *</label>
                    <input
                        type="text"
                        id="login"
                        name="login"
                        class="form-input"
                        placeholder="Только латиница и цифры, от 6 символов"
                        autocomplete="username"
                    >
                    <span class="form-error" id="loginError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль *</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Минимум 8 символов"
                        autocomplete="new-password"
                    >
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="full_name">ФИО *</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        class="form-input"
                        placeholder="Иванов Иван Иванович"
                        autocomplete="name"
                    >
                    <span class="form-error" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Телефон *</label>
                    <input
                        type="text"
                        id="phone"
                        name="phone"
                        class="form-input"
                        placeholder="8(XXX)XXX-XX-XX"
                        autocomplete="tel"
                        maxlength="16"
                    >
                    <span class="form-error" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email *</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="example@mail.ru"
                        autocomplete="email"
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div id="formAlert" class="alert" style="display:none;"></div>

                <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
                    Создать пользователя
                </button>
            </form>

            <div class="auth-card__footer">
                <p>Уже есть аккаунт? <a href="login.html" class="link">Войти</a></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
